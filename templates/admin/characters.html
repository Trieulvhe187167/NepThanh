{% extends "admin/base.html" %}
{% block content %}
<div class="admin-card">
    <a class="btn btn-primary" href="{{ url_for('admin_character_new') }}">Thêm nhân vật</a>
    <a class="btn btn-secondary" href="{{ url_for('admin_qr') }}">Quản lý QR</a>
</div>
<div class="admin-card" style="margin-top: 1.5rem;">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Tên</th>
                <th>Slug</th>
                <th>Trạng thái</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for char in characters %}
            <tr>
                <td>{{ char.name }}</td>
                <td>{{ char.slug }}</td>
                <td>{% if char.is_active %}<span class="badge success">Hiển thị</span>{% else %}<span class="badge danger">Ẩn</span>{% endif %}</td>
                <td>
                    <a class="btn btn-secondary" href="{{ url_for('admin_character_edit', character_id=char.id) }}">Sửa</a>
                    <form method="post" action="{{ url_for('admin_character_delete', character_id=char.id) }}" style="display: inline;" onsubmit="return confirm('Xóa nhân vật?')">
                        <button class="btn btn-danger" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="muted">Chưa có nhân vật.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
