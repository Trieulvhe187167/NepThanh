{% extends "admin/base.html" %}
{% block content %}
{% if error %}<p class="notice">{{ error }}</p>{% endif %}
<div class="admin-card">
    <form method="post">
        <div class="form-grid">
            <div class="form-group">
                <label>Chọn khách hàng (tuỳ chọn)</label>
                <select name="user_id">
                    <option value="">-- Không chọn --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.full_name or user.email }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input name="email" type="email" />
            </div>
            <div class="form-group">
                <label>Tên người nhận</label>
                <input name="recipient_name" />
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input name="phone" />
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input name="line1" />
            </div>
            <div class="form-group">
                <label>Địa chỉ bổ sung</label>
                <input name="line2" />
            </div>
            <div class="form-group">
                <label>Phường / xã</label>
                <input name="ward" />
            </div>
            <div class="form-group">
                <label>Quận / huyện</label>
                <input name="district" />
            </div>
            <div class="form-group">
                <label>Tỉnh / thành</label>
                <input name="province" />
            </div>
            <div class="form-group">
                <label>Phí ship</label>
                <input name="shipping_fee" type="number" value="0" />
            </div>
            <div class="form-group">
                <label>Giảm giá</label>
                <input name="discount_amount" type="number" value="0" />
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Ghi chú</label>
                <textarea name="notes"></textarea>
            </div>
        </div>

        <h3 class="admin-section-title">Sản phẩm</h3>
        <table class="admin-table" id="items-table">
            <thead>
                <tr>
                    <th>Biến thể</th>
                    <th>Số lượng</th>
                    <th>Giá</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <select name="variant_id" class="variant-select">
                            <option value="">-- Chọn biến thể --</option>
                            {% for variant in variants %}
                            <option value="{{ variant.id }}" data-price="{{ variant.price if variant.price is not none else variant.base_price }}">
                                {{ variant.product_name }} - {{ variant.size }}/{{ variant.color }} ({{ variant.sku }})
                            </option>
                            {% endfor %}
                        </select>
                    </td>
                    <td><input type="number" name="qty" value="1" min="1" /></td>
                    <td><input type="number" name="price" value="0" /></td>
                    <td><button class="btn btn-ghost" type="button" onclick="removeRow(this)">Xóa</button></td>
                </tr>
            </tbody>
        </table>
        <div style="margin-top: 0.8rem;">
            <button class="btn btn-secondary" type="button" onclick="addRow()">Thêm dòng</button>
        </div>
        <div style="margin-top: 1.5rem;">
            <button class="btn btn-primary" type="submit">Tạo đơn</button>
        </div>
    </form>
</div>

<script>
function addRow() {
    const table = document.getElementById('items-table').querySelector('tbody');
    const row = table.rows[0].cloneNode(true);
    row.querySelectorAll('input').forEach(input => {
        if (input.name === 'qty') input.value = 1;
        else input.value = 0;
    });
    row.querySelector('select').value = '';
    table.appendChild(row);
}
function removeRow(btn) {
    const table = document.getElementById('items-table').querySelector('tbody');
    if (table.rows.length > 1) {
        btn.closest('tr').remove();
    }
}
function updatePrice(select) {
    const price = select.options[select.selectedIndex].dataset.price || 0;
    const row = select.closest('tr');
    row.querySelector('input[name="price"]').value = price;
}
window.addEventListener('change', (event) => {
    if (event.target.classList.contains('variant-select')) {
        updatePrice(event.target);
    }
});
</script>
{% endblock %}
