{% extends "admin/base.html" %}
{% block content %}
{% if error %}<p class="notice">{{ error }}</p>{% endif %}
<div class="admin-card">
    <form method="post" class="form-grid">
        <input type="hidden" name="action" value="create" />
        <div class="form-group">
            <label>Email</label>
            <input name="email" required />
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required />
        </div>
        <div class="form-group">
            <label>Họ tên</label>
            <input name="full_name" />
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role">
                {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="align-self: end;">
            <button class="btn btn-primary" type="submit">Tạo tài khoản</button>
        </div>
    </form>
</div>

<div class="admin-card" style="margin-top: 1.5rem;">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Email</th>
                <th>Họ tên</th>
                <th>Role</th>
                <th>Trạng thái</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.email }}</td>
                <td>{{ user.full_name }}</td>
                <td>
                    <form method="post" style="display: flex; gap: 0.4rem;">
                        <input type="hidden" name="action" value="update_role" />
                        <input type="hidden" name="user_id" value="{{ user.id }}" />
                        <select name="role">
                            {% for role in roles %}
                            <option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role }}</option>
                            {% endfor %}
                        </select>
                        <button class="btn btn-secondary" type="submit">Lưu</button>
                    </form>
                </td>
                <td>{% if user.is_blocked %}<span class="badge danger">Khóa</span>{% else %}<span class="badge success">OK</span>{% endif %}</td>
                <td>
                    <form method="post">
                        <input type="hidden" name="action" value="toggle_block" />
                        <input type="hidden" name="user_id" value="{{ user.id }}" />
                        <button class="btn btn-danger" type="submit">{% if user.is_blocked %}Mở khóa{% else %}Khóa{% endif %}</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="muted">Chưa có tài khoản.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
