{% extends "base.html" %}
{% block content %}
<section>
    <h1>Blog</h1>
    <div class="grid">
        {% for post in posts %}
        <article class="card">
            {% if post.cover_image %}
            <img src="{{ post.cover_image }}" alt="{{ post.title }}" />
            {% endif %}
            <h3>{{ post.title }}</h3>
            <p>{{ post.excerpt }}</p>
            <a href="{{ url_for('blog_detail', slug=post.slug) }}" class="btn-secondary">Đọc thêm</a>
        </article>
        {% else %}
        <p>Chưa có bài viết.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
